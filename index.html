<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Novaflix</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      const canUseVite = async () => {
        try {
          const response = await fetch('/@vite/client', { cache: 'no-store' });
          return response.ok;
        } catch {
          return false;
        }
      };

      if (await canUseVite()) {
        await import('/src/main.jsx');
      } else if (!location.pathname.startsWith('/dist/')) {
        location.replace('/dist/');
      }
    </script>
  </body>
</html>
