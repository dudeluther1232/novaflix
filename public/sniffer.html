<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>sniffer</title>
  <style>
    body { margin: 0; background: #000; overflow: hidden; }
    iframe { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; border: none; }
  </style>
</head>
<body>
<script type="module">
import { ScramjetController, ScramjetFrame } from '/scramjet/scramjet.bundle.js';
// BareMuxConnection lives inside bare-as-module3, NOT in scramjet.bundle.js
import { BareMuxConnection } from '/scramjet/baremux.js';

const params    = new URLSearchParams(location.search);
const mediaType = params.get('mediaType');
const id        = params.get('id');
const season    = params.get('season')  || '1';
const episode   = params.get('episode') || '1';

if (!mediaType || !id) throw new Error('Missing params');

const videasyUrl = mediaType === 'movie'
  ? `https://player.videasy.net/movie/${id}`
  : `https://player.videasy.net/tv/${id}/${season}/${episode}`;

// Safety timeout
const tid = setTimeout(() => window.parent.postMessage({ type: 'NOVAFLIX_TIMEOUT' }, '*'), 25000);

// Relay SW messages up to parent
navigator.serviceWorker.addEventListener('message', ev => {
  if (ev.data?.type === 'NOVAFLIX_M3U8') {
    clearTimeout(tid);
    window.parent.postMessage(ev.data, '*');
  }
});

// ── ScramjetController config ─────────────────────────────────────────────
const scram = new ScramjetController({
  prefix: '/scramjet/service/',
  files: {
    wasm: '/scramjet/scramjet.wasm.wasm',
    all:  '/scramjet/scramjet.all.js',
    sync: '/scramjet/scramjet.sync.js',
  },
  flags: {
    serviceworkers: false,
    syncxhr: false,
    strictRewrites: true,
    rewriterLogs: false,
  },
});

async function resetScramjetDb() {
  await new Promise((resolve, reject) => {
    const req = indexedDB.deleteDatabase('$scramjet');
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error || new Error('Failed to delete $scramjet DB'));
    req.onblocked = () => reject(new Error('$scramjet DB delete was blocked'));
  });
}

async function initScramjetController() {
  try {
    await scram.init();
  } catch (e) {
    if (e?.name !== 'NotFoundError') throw e;
    console.warn('[sniffer] scramjet DB schema mismatch, resetting DB');
    await resetScramjetDb();
    await scram.init();
  }
}

// ── Initialise scramjet config before the SW starts routing ───────────────
await initScramjetController();

// ── Register the scramjet service worker (MUST be classic — it uses importScripts) ────
let reg;
try {
  reg = await navigator.serviceWorker.register('/scramjet-sw.js', {
    // No type:'module' — scramjet-sw.js uses importScripts() which is classic-only
    scope: '/scramjet/',
    updateViaCache: 'none',
  });
  await navigator.serviceWorker.ready;
  console.log('[sniffer] SW registered, state:', reg.active?.state);
} catch (e) {
  window.parent.postMessage({ type: 'NOVAFLIX_SW_ERROR', error: e.message }, '*');
  clearTimeout(tid);
  throw e;
}

// Reset SW sniff state
reg.active?.postMessage({ type: 'SCRAMJET_RESET' });

// ── Configure bare-mux transport ──────────────────────────────────────────
// BareMuxConnection comes from /scramjet/baremux.js (bare-as-module3 dist).
// scramjet.sync.js is the SharedWorker that routes requests through the transport.
try {
  const conn = new BareMuxConnection('/scramjet/baremux-worker.js');
  await conn.setTransport('/scramjet/bare.js', [location.origin + '/bare/']);
  console.log('[sniffer] bare transport ready');
} catch (e) {
  console.warn('[sniffer] bare transport setup failed:', e.message);
}

// ── Load videasy inside a scramjet-proxied iframe ─────────────────────────
const iframeEl = document.createElement('iframe');
document.body.appendChild(iframeEl);

const frame = scram.createFrame(iframeEl);

frame.addEventListener('urlchange', ev => console.log('[sniffer] url:', ev.url));

frame.go(videasyUrl);
console.log('[sniffer] navigating ->', videasyUrl);
</script>
</body>
</html>
